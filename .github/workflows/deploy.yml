name: Deploy AI Marketing

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to IIS + PM2
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          & "$env:GITHUB_WORKSPACE\deploy\deploy.ps1"
